apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentx-controlplane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentx-controlplane
  template:
    metadata:
      labels:
        app: agentx-controlplane
    spec:
      containers:
        - name: controlplane
          image: agentx:latest
          imagePullPolicy: IfNotPresent
          command: ["agentx", "controlplane", "--host", "0.0.0.0", "--port", "28880"]
          ports:
            - containerPort: 28880
          volumeMounts:
            - name: agentx-data
              mountPath: /root/.agentx
          readinessProbe:
            httpGet:
              path: /api/health
              port: 28880
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/health
              port: 28880
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: agentx-data
          persistentVolumeClaim:
            claimName: agentx-data-pvc
