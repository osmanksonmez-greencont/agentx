apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentx-team-runtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agentx-team-runtime
  template:
    metadata:
      labels:
        app: agentx-team-runtime
    spec:
      containers:
        - name: agentx
          image: agentx:latest
          imagePullPolicy: IfNotPresent
          command: ["agentx", "team", "run", "--project", "default"]
          envFrom:
            - configMapRef:
                name: agentx-config
          volumeMounts:
            - name: agentx-data
              mountPath: /root/.agentx
          readinessProbe:
            exec:
              command: ["sh", "-lc", "test -f /root/.agentx/config.json || exit 1"]
            initialDelaySeconds: 10
            periodSeconds: 20
          livenessProbe:
            exec:
              command: ["sh", "-lc", "ps aux | grep 'agentx team run' | grep -v grep"]
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
      volumes:
        - name: agentx-data
          persistentVolumeClaim:
            claimName: agentx-data-pvc
