apiVersion: apps/v1
kind: Deployment
metadata:
  name: nanobot-team-runtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nanobot-team-runtime
  template:
    metadata:
      labels:
        app: nanobot-team-runtime
    spec:
      containers:
        - name: nanobot
          image: nanobot:latest
          imagePullPolicy: IfNotPresent
          command: ["nanobot", "team", "run", "--project", "default"]
          envFrom:
            - configMapRef:
                name: nanobot-config
          volumeMounts:
            - name: nanobot-data
              mountPath: /root/.nanobot
          readinessProbe:
            exec:
              command: ["sh", "-lc", "test -f /root/.nanobot/config.json || exit 1"]
            initialDelaySeconds: 10
            periodSeconds: 20
          livenessProbe:
            exec:
              command: ["sh", "-lc", "ps aux | grep 'nanobot team run' | grep -v grep"]
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
      volumes:
        - name: nanobot-data
          persistentVolumeClaim:
            claimName: nanobot-data-pvc
