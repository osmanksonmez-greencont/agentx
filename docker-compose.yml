x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.agentx:/root/.agentx

services:
  agentx-gateway:
    container_name: agentx-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    ports:
      - 28790:28790
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
  
  agentx-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
